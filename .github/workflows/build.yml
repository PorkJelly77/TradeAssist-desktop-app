name: Build and Release

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'src-tauri/**'
      - '.github/workflows/**'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Tauri app
        run: |
          cd src-tauri
          cargo build --release

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: TradeAssist-installer
          path: src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload portable exe
        uses: actions/upload-artifact@v4
        with:
          name: TradeAssist-portable
          path: src-tauri/target/release/tradeassist-app.exe

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "v$(Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version"
          gh release create $tag --title "TradeAssist $tag" --notes "Auto-built release" --target main
          gh release upload $tag src-tauri/target/release/bundle/nsis/*.exe --clobber
          gh release upload $tag src-tauri/target/release/tradeassist-app.exe --clobber
